<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phân tích thông tin sinh viên</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    * {
      font-family: 'Inter', sans-serif;
    }

    .score-fill {
      animation: growBar 1s ease-out forwards;
    }

    @keyframes growBar {
      from {
        width: 0%;
      }
    }

    .card-in {
      animation: fadeUp 0.4s ease-out both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Drag-over highlight */
    .drag-over {
      border-color: #3b82f6 !important;
      background: #eef2ff !important;
    }

    /* Spinner */
    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid #c7d2fe;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Preview images */
    .img-thumb {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 8px;
    }

    /* Pulse status dot */
    .pulse-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 1.6s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .3;
      }
    }

    /* Collapsible input card */
    .input-body {
      max-height: 600px;
      overflow: hidden;
      transition: max-height 0.4s ease, opacity 0.3s ease, margin-top 0.3s ease;
      opacity: 1;
    }

    .input-body.collapsed {
      max-height: 0;
      opacity: 0;
      margin-top: 0 !important;
    }

    .toggle-icon {
      transition: transform 0.3s ease;
    }

    .toggle-icon.collapsed {
      transform: rotate(180deg);
    }
  </style>
</head>

<body class="bg-gradient-to-r from-blue-400 to-purple-500 min-h-screen text-gray-800 p-2 md:p-6">
  <div class="container mx-auto">
    <div class="bg-white shadow-2xl form-wrapper rounded-3xl p-4 md:p-8 max-w-6xl mx-auto min-h-[calc(100vh-4rem)]">

      <!-- ═══ HEADER ═══ -->
      <!-- Compact Header -->
      <nav
        class="bg-white shadow-sm mb-6 rounded-2xl sticky top-2 z-50 border border-gray-100 py-2 transition-all hover:shadow-md">
        <div class="container mx-auto px-4 py-2">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-4">
              <div
                class="w-12 h-12 rounded-xl bg-gradient-to-r from-blue-500 to-purple-600 flex items-center justify-center text-white shadow-lg shadow-blue-500/30">
                <i class="fas fa-graduation-cap text-2xl"></i>
              </div>
              <div>
                <h1 class="font-bold text-gray-900 text-lg md:text-xl tracking-tight">VietTinPay AI Student</h1>
                <p class="text-sm text-gray-500 hidden md:block">Hệ thống phân tích thông tin & thẩm định hồ sơ</p>
              </div>
            </div>
            <div id="api-status"
              class="flex items-center gap-2 text-xs md:text-sm text-gray-600 bg-gray-50 px-4 py-2 rounded-full border border-gray-200 shadow-inner">
              <span class="pulse-dot bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]"></span>
              <span class="hidden md:inline font-medium">API Đang Hoạt Động</span>
            </div>
          </div>
        </div>
      </nav>

      <main class="w-full space-y-6">

        <!-- ═══ INPUT FORM ═══ -->
        <div id="input-card"
          class="bg-white rounded-2xl shadow-lg border border-gray-100 p-6 md:p-8 card-in ring-1 ring-gray-50">
          <div class="flex items-center justify-between cursor-pointer" onclick="toggleInputCard()">
            <p class="text-sm font-bold text-gray-800"><span
                class="flex items-center gap-3 text-xl font-bold text-gray-800">
                <div class="p-2 bg-blue-100 rounded-lg"><i class="fas fa-cloud-upload-alt text-blue-600 text-xl"></i>
                </div>Nhập ảnh để phân tích
              </span></p>
            <button id="toggle-btn"
              class="hidden items-center gap-1.5 text-xs text-gray-800 hover:text-gray-800 font-medium transition-colors">
              <span>Nhập lại</span>
              <svg class="toggle-icon w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
              </svg>
            </button>
          </div>

          <div id="input-body" class="input-body mt-4">
            <!-- Tab: URL / Upload -->
            <div class="flex gap-1 p-1 bg-white rounded-lg mb-5 w-fit">
              <button id="tab-url" onclick="switchTab('url')"
                class="tab-btn active px-5 py-2.5 rounded-xl text-sm font-bold transition-all bg-white shadow-md text-blue-600 ring-1 ring-black/5"><i
                  class="fas fa-link text-blue-500 mr-2 text-lg"></i>
                URL ảnh</button>
              <button id="tab-upload" onclick="switchTab('upload')"
                class="tab-btn px-4 py-1.5 rounded-md text-sm font-medium transition-all text-gray-800 hover:text-gray-800"><i
                  class="fas fa-folder-open text-purple-500 mr-2 text-lg"></i>
                Upload file</button>
            </div>

            <!-- Panel: URL -->
            <div id="panel-url" class="space-y-3">
              <div id="url-list" class="space-y-2"></div>
              <button onclick="addUrlInput()"
                class="flex items-center gap-1.5 text-xs text-gray-800 hover:text-gray-800 font-medium transition-colors">
                <span class="text-base leading-none">＋</span> Thêm URL
              </button>
            </div>

            <!-- Panel: Upload -->
            <div id="panel-upload" class="hidden">
              <div id="drop-zone"
                class="border-2 border-dashed border-blue-300 bg-blue-50/50 rounded-xl p-8 text-center cursor-pointer hover:border-blue-400 hover:bg-white transition-all"
                ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)"
                onclick="document.getElementById('file-input').click()">
                <i class="fas fa-cloud-upload-alt text-5xl text-blue-400 mb-4 block drop-shadow-sm"></i>
                <p class="text-sm font-medium text-gray-800">Kéo thả ảnh vào đây, hoặc click để chọn</p>
                <p class="text-xs text-gray-800 mt-1">JPG, PNG, WEBP — tối đa 10MB</p>
                <input id="file-input" type="file" accept="image/*" multiple class="hidden"
                  onchange="onFileSelect(event)" />
              </div>
              <div id="file-preview" class="flex flex-wrap gap-3 mt-4"></div>
            </div>

            <!-- Submit -->
            <button id="submit-btn" onclick="submitRequest()"
              class="mt-5 w-full flex items-center justify-center gap-2 bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 active:scale-95 text-white font-semibold rounded-xl py-3 transition-all shadow-sm disabled:opacity-50 disabled:cursor-not-allowed">
              <span id="btn-icon"><i class="fas fa-search text-lg"></i></span>
              <span id="btn-text">Phân tích</span>
            </button>
          </div>
        </div>

        <!-- ═══ RESULT AREA ═══ -->
        <div id="result-area"></div>

      </main>

      <script>
        // ─── State ───────────────────────────────────────────────
        const API_URL = '/api/extract';  // relative — same server as FastAPI
        let currentTab = 'url';
        let selectedFiles = [];
        let urlInputCount = 0;
        let submittedImageUrls = [];
        let currentPreviewIndex = 0;

        // ─── Image Slider ─────────────────────────────────────────
        window.nextPreview = function () {
          if (!submittedImageUrls.length) return;
          currentPreviewIndex = (currentPreviewIndex + 1) % submittedImageUrls.length;
          updatePreviewSlider();
        };

        window.prevPreview = function () {
          if (!submittedImageUrls.length) return;
          currentPreviewIndex = (currentPreviewIndex - 1 + submittedImageUrls.length) % submittedImageUrls.length;
          updatePreviewSlider();
        };

        function updatePreviewSlider() {
          const imgEl = document.getElementById('preview-slider-img');
          const counterEl = document.getElementById('preview-slider-counter');
          const linkEl = document.getElementById('preview-slider-link');
          if (imgEl && submittedImageUrls[currentPreviewIndex]) {
            const url = submittedImageUrls[currentPreviewIndex];
            imgEl.src = url;
            if (linkEl) linkEl.href = url;
            if (counterEl) counterEl.textContent = `${currentPreviewIndex + 1} / ${submittedImageUrls.length}`;
          }
        }

        // ─── Tab switching ────────────────────────────────────────
        function switchTab(tab) {
          currentTab = tab;
          document.getElementById('panel-url').classList.toggle('hidden', tab !== 'url');
          document.getElementById('panel-upload').classList.toggle('hidden', tab !== 'upload');
          document.querySelectorAll('.tab-btn').forEach(btn => {
            const isActive = btn.id === `tab-${tab}`;
            btn.classList.toggle('bg-white', isActive);
            btn.classList.toggle('shadow-md', isActive);
            btn.classList.toggle('font-bold', isActive);
            btn.classList.toggle('text-blue-600', isActive);
            btn.classList.toggle('text-gray-500', !isActive);
          });
        }

        // ─── URL inputs ───────────────────────────────────────────
        function addUrlInput(value = '') {
          urlInputCount++;
          const id = `url-input-${urlInputCount}`;
          const div = document.createElement('div');
          div.className = 'flex gap-2 items-center';
          div.id = `url-row-${urlInputCount}`;
          div.innerHTML = `
        <input id="${id}" type="url" value="${value}" placeholder="https://example.com/bangdiem.jpg"
          class="flex-1 px-4 py-2.5 rounded-xl border border-gray-200 text-sm bg-white focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all placeholder-gray-300" />
        <button onclick="document.getElementById('url-row-${urlInputCount}').remove()" class="text-gray-300 hover:text-red-400 transition-colors text-lg leading-none">×</button>`;
          document.getElementById('url-list').appendChild(div);
        }

        // Init with 1 URL input
        addUrlInput();

        // ─── File upload ──────────────────────────────────────────
        function onDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
        function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
        function onDrop(e) {
          e.preventDefault(); e.currentTarget.classList.remove('drag-over');
          addFiles(Array.from(e.dataTransfer.files));
        }
        function onFileSelect(e) { addFiles(Array.from(e.target.files)); }

        function addFiles(newFiles) {
          const valid = newFiles.filter(f => f.type.startsWith('image/'));
          selectedFiles.push(...valid);
          renderFilePreviews();
        }

        function renderFilePreviews() {
          const container = document.getElementById('file-preview');
          container.innerHTML = '';
          selectedFiles.forEach((file, i) => {
            const url = URL.createObjectURL(file);
            const div = document.createElement('div');
            div.className = 'relative group';
            div.innerHTML = `
          <img src="${url}" class="img-thumb border border-gray-200 shadow-sm" />
          <button onclick="removeFile(${i})"
            class="absolute -top-1.5 -right-1.5 w-5 h-5 bg-red-500 text-white rounded-full text-xs flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">×</button>
          <p class="text-[9px] text-gray-800 mt-1 max-w-[72px] truncate">${file.name}</p>`;
            container.appendChild(div);
          });
        }

        function removeFile(i) { selectedFiles.splice(i, 1); renderFilePreviews(); }

        // ─── Submit ───────────────────────────────────────────────
        async function submitRequest() {
          setLoading(true);

          try {
            let response;

            if (currentTab === 'url') {
              const inputs = document.querySelectorAll('#url-list input[type="url"]');
              const urls = Array.from(inputs).map(i => i.value.trim()).filter(Boolean);
              if (!urls.length) { alert('Vui lòng nhập ít nhất 1 URL ảnh.'); setLoading(false); return; }

              submittedImageUrls = [...urls];
              currentPreviewIndex = 0;

              const fd = new FormData();
              urls.forEach(u => fd.append('images', u));
              response = await fetch(API_URL, { method: 'POST', body: fd });

            } else {
              if (!selectedFiles.length) { alert('Vui lòng chọn ít nhất 1 file ảnh.'); setLoading(false); return; }

              submittedImageUrls = selectedFiles.map(f => URL.createObjectURL(f));
              currentPreviewIndex = 0;

              const fd = new FormData();
              selectedFiles.forEach(f => fd.append('files', f));
              response = await fetch(API_URL, { method: 'POST', body: fd });
            }

            if (!response.ok) {
              const errText = await response.text();
              throw new Error(`HTTP ${response.status}: ${errText}`);
            }

            const data = await response.json();
            renderResult(data);
            collapseInputCard();

          } catch (err) {
            renderError(err.message);
          } finally {
            setLoading(false);
          }
        }

        // ─── Collapse / Expand input card ─────────────────────────
        let inputCollapsed = false;

        function collapseInputCard() {
          inputCollapsed = true;
          document.getElementById('input-body').classList.add('collapsed');
          document.getElementById('toggle-btn').classList.remove('hidden');
          document.getElementById('toggle-btn').classList.add('flex');
          document.querySelector('.toggle-icon').classList.add('collapsed');
        }

        function expandInputCard() {
          inputCollapsed = false;
          document.getElementById('input-body').classList.remove('collapsed');
          document.querySelector('.toggle-icon').classList.remove('collapsed');
        }

        function toggleInputCard() {
          if (!document.getElementById('toggle-btn').classList.contains('hidden')) {
            inputCollapsed ? expandInputCard() : collapseInputCard();
          }
        }

        // ─── Loading state ────────────────────────────────────────
        function setLoading(on) {
          const btn = document.getElementById('submit-btn');
          const icon = document.getElementById('btn-icon');
          const text = document.getElementById('btn-text');
          btn.disabled = on;
          icon.innerHTML = on ? '<div class="spinner"></div>' : '🔍';
          text.textContent = on ? 'Đang phân tích...' : 'Phân tích';
        }

        // ─── Gauge helper ─────────────────────────────────────────
        function renderGauge(score, rating) {
          const color = SCORE_COLOR[rating] || '#3b82f6';
          const pct = Math.min(Math.max(score || 0, 0), 100);
          // semi-circle: r=46, cx=56 cy=56, arc from 180° to 0° (left→right)
          const r = 46, cx = 56, cy = 60;
          const circumference = Math.PI * r; // half circle
          const dash = (pct / 100) * circumference;
          const gap = circumference - dash;
          return `
        <svg viewBox="0 0 112 70" width="120" height="75">
          <!-- Track -->
          <path d="M10,60 A46,46 0 0,1 102,60" fill="none" stroke="#e5e7eb" stroke-width="10" stroke-linecap="round"/>
          <!-- Fill -->
          <path d="M10,60 A46,46 0 0,1 102,60" fill="none" stroke="${color}" stroke-width="10"
            stroke-linecap="round"
            stroke-dasharray="${dash.toFixed(1)} ${gap.toFixed(1)}"
            stroke-dashoffset="0"
            style="transition:stroke-dasharray 1s ease-out;"/>
          <!-- Score label -->
          <text x="56" y="56" text-anchor="middle" font-size="18" font-weight="800" fill="${color}" font-family="Inter,sans-serif">${pct.toFixed(0)}</text>
          <text x="56" y="68" text-anchor="middle" font-size="8" fill="#9ca3af" font-family="Inter,sans-serif">/100</text>
        </svg>`;
        }

        // ─── Rating helpers ───────────────────────────────────────
        const RATING_STYLE = {
          'Top': 'bg-purple-100 text-purple-700 border-purple-200',
          'Tốt': 'bg-green-100 text-green-700 border-green-200',
          'Khá': 'bg-blue-100 text-blue-700 border-blue-200',
          'Trung bình': 'bg-yellow-100 text-yellow-800 border-yellow-200',
          'Kém': 'bg-red-100 text-red-700 border-red-200',
        };
        const RATING_BADGE = {
          'Top': '🏆 Top Tier', 'Tốt': '✨ Tốt', 'Khá': '👍 Khá',
          'Trung bình': '⚖️ Trung bình', 'Kém': '⚠️ Kém',
        };
        const SCORE_COLOR = {
          'Top': '#a855f7', 'Tốt': '#22c55e', 'Khá': '#3b82f6',
          'Trung bình': '#eab308', 'Kém': '#ef4444',
        };
        const REGION_LABEL = { urban: '🏙️ Trung tâm TP', suburban: '🏘️ Ngoại ô / Huyện', rural: '🌾 Nông thôn' };
        const POSITION_LABEL = { main_street: '🛣️ Mặt tiền', alley: '↪️ Hẻm xe hơi', deep_alley: '🚫 Hẻm sâu' };

        function ratingBadge(rating) {
          const s = RATING_STYLE[rating] || '';
          return `<span class="px-3 py-0.5 rounded-full text-xs font-bold border ${s}">${RATING_BADGE[rating] || rating}</span>`;
        }

        // ─── Render result ────────────────────────────────────────
        function renderResult(data) {
          const area = document.getElementById('result-area');

          // ── OCR raw (from results[0].data) ──
          const ocr = data.results?.[0]?.data || {};
          const src = data.results?.[0]?.source || '';

          // ── University data ──
          const ud = data.university_data;

          let html = ``;

          // ══ ROW 1: OCR Card (full width) ══
          html += `
      <div class="card-in bg-gradient-to-br from-blue-50 to-indigo-50 rounded-2xl shadow-sm border border-blue-100 p-6 mb-6">
        <p class="text-lg font-black uppercase tracking-widest text-gray-800 mb-3"><i class="fas fa-file-invoice text-blue-600 mr-2"></i>Thông tin chính</p>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3 text-base">
          <div class="bg-white rounded-xl p-4 border border-blue-100 shadow-sm">
            <p class="text-sm text-gray-500 uppercase mb-1 font-semibold text-[11px] tracking-wider">Tên trường</p>
            <p class="font-bold text-gray-800">${ocr.school_name || '<span class="text-gray-800 italic">Không tìm thấy</span>'}</p>
          </div>
          <div class="bg-white rounded-xl p-4 border border-blue-100 shadow-sm">
            <p class="text-sm text-gray-500 uppercase mb-1 font-semibold text-[11px] tracking-wider">Ngành</p>
            <p class="font-bold text-gray-800">${ocr.major || '<span class="text-gray-800 italic">Không tìm thấy</span>'}</p>
          </div>
          <div class="bg-white rounded-xl p-4 border border-blue-100 shadow-sm">
            <p class="text-sm text-gray-500 uppercase mb-1 font-semibold text-[11px] tracking-wider">GPA</p>
            <p class="font-bold ${ocr.gpa ? 'text-gray-800' : 'text-gray-800 italic'}">${ocr.gpa ?? 'Không tìm thấy'}</p>
          </div>
        </div>
      </div>`;

          // ══ ROW 2: Grid [Trường + Ngành | Preview ảnh] ══
          const previewCard = submittedImageUrls.length ? `
        <div class="bg-white rounded-2xl shadow-lg border border-gray-200 p-4 md:sticky md:top-6 md:col-span-2 flex flex-col items-center">
          <div class="flex items-center justify-between w-full mb-3">
            <p class="text-sm font-bold uppercase tracking-widest text-gray-800"><i class="fas fa-image text-purple-600 mr-2"></i>Ảnh minh chứng</p>
            ${submittedImageUrls.length > 1 ? `<span id="preview-slider-counter" class="text-xs font-medium text-gray-800 bg-white px-2 py-0.5 rounded-md">1 / ${submittedImageUrls.length}</span>` : ''}
          </div>
          
          <div class="relative w-full flex-1 flex items-center justify-center overflow-hidden min-h-[300px]">
             <a id="preview-slider-link" href="${submittedImageUrls[0]}" target="_blank" class="block w-full h-full flex items-center justify-center">
               <img id="preview-slider-img" src="${submittedImageUrls[0]}" class="w-full h-auto object-contain rounded drop-shadow-sm transition-opacity duration-200" onerror="this.parentElement.style.display='none'" />
             </a>
             
             ${submittedImageUrls.length > 1 ? `
             <button onclick="prevPreview()" class="absolute left-2 top-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center bg-white/90 hover:bg-white text-gray-800 rounded-full shadow-md border border-gray-200 transition-all hover:scale-105 active:scale-95">
               <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
             </button>
             <button onclick="nextPreview()" class="absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center bg-white/90 hover:bg-white text-gray-800 rounded-full shadow-md border border-gray-200 transition-all hover:scale-105 active:scale-95">
               <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
             </button>
             ` : ''}
          </div>
        </div>` : '';

          if (ud && (ud.university || ud.major)) {
            const u = ud.university || {};
            const m = ud.major || {};
            const hasUniversity = u && u.name;
            const hasMajor = m && m.name;
            const uScoreColor = SCORE_COLOR[u?.rating] || '#3b82f6';
            const mScoreColor = SCORE_COLOR[m?.rating] || '#3b82f6';

            html += `
        <div class="card-in grid grid-cols-1 ${previewCard ? 'md:grid-cols-5' : ''} gap-5">

          <div class="${previewCard ? 'md:col-span-3' : ''} space-y-5">

            <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden border border-gray-200">
              <!-- Header gradient -->

              <div class="p-5 space-y-5">

                <!-- 1. Điểm đánh giá -->
                <div class="grid grid-cols-1 ${hasMajor ? 'md:grid-cols-2' : ''} gap-4">
                  ${hasUniversity ? `
                  <div class="flex flex-col items-center justify-center p-4 bg-white rounded-xl border border-gray-200">
                    <p class="text-lg font-bold uppercase tracking-wider text-gray-800 mb-2"><i class="fas fa-university text-blue-600 mr-2 text-xl"></i>Điểm trường</p>
                    ${renderGauge(u.schoolScore100, u.rating)}
                    <div class="mt-2 text-center">
                      <p class="text-sm font-bold px-3 py-1 rounded-full inline-block ${RATING_STYLE[u.rating] || 'bg-white text-gray-800'}">${RATING_BADGE[u.rating] || u.rating}</p>
                    </div>
                  </div>` : ''}
                  ${hasMajor ? `
                  <div class="flex flex-col items-center justify-center p-4 bg-white rounded-xl border border-gray-200">
                    <p class="text-lg font-bold uppercase tracking-wider text-gray-800 mb-2"><i class="fas fa-graduation-cap text-purple-600 mr-2 text-xl"></i>Điểm ngành</p>
                    ${renderGauge(m.majorScore100, m.rating)}
                    <div class="mt-2 text-center">
                      <p class="text-sm font-bold px-3 py-1 rounded-full inline-block ${RATING_STYLE[m.rating] || 'bg-white text-gray-800'}">${RATING_BADGE[m.rating] || m.rating}</p>
                    </div>
                  </div>` : ''}
                </div>

                <!-- 2. Học phí -->
                ${(hasMajor && m.tuitionAvg) || (hasUniversity && u.tuitionAvg) ? `
                <div class="bg-green-50 rounded-lg p-4 border border-green-100">
                  <p class="text-base font-bold text-green-700 tracking-wider mb-1"><i class="fas fa-money-bill-wave text-green-600 mr-2"></i>Học phí ước tính</p>
                  <p class="text-sm font-semibold text-green-900">${hasMajor
                  ? (m.tuition || (m.tuitionAvg ? (m.tuitionAvg / 1_000_000).toFixed(0) + ' triệu / năm' : 'N/A'))
                  : (u.tuition || (u.tuitionAvg ? (u.tuitionAvg / 1_000_000).toFixed(0) + ' triệu / năm' : 'N/A'))
                }</p>
                </div>` : ''}

                <!-- 3. Phân tích trường -->
                ${hasUniversity && u.description ? `
                <br>
                <div>
                  <h3 class="text-base font-bold text-gray-800 flex items-center gap-2 mb-2"><i class="fas fa-building text-blue-600 mr-2"></i>Phân tích tổng quan trường: ${u.name}</h3>
                  <p class="text-gray-800 text-base leading-relaxed">${u.description}</p>
                </div>` : ''}

                <br>
                <!-- 4. Phân tích ngành -->
                ${hasMajor ? `
                <div>
                  <h3 class="text-base font-bold text-gray-800 flex items-center gap-2 mb-2"><i class="fas fa-book-reader text-purple-600 mr-2"></i>Phân tích chuyên sâu ngành — ${m.name}</h3>
                  ${m.description ? `<p class="text-gray-800 text-base leading-relaxed mb-4">${m.description}</p>` : ''}

                  <br>
                  <div class="bg-white rounded-lg overflow-hidden border border-gray-200">
                    <table class="w-full text-base text-left">
                      <thead class="text-sm font-bold text-gray-800 uppercase bg-white">
                        <tr>
                          <th class="px-3 py-2">Điểm chuẩn các năm</th>
                          <th class="px-3 py-1.5 text-right">Giá trị</th>
                        </tr>
                      </thead>
                      <tbody>
                        ${(m.admissionScores && m.admissionScores.length > 0) ? m.admissionScores.map(scoreObj => `
                        <tr class="border-b border-gray-200 hover:bg-white transition-colors">
                          <td class="px-3 py-1.5 font-medium text-gray-800">Điểm chuẩn (${scoreObj.year})</td>
                          <td class="px-3 py-1.5 text-right font-bold text-gray-800">${scoreObj.score}</td>
                        </tr>`).join('') : `
                        <tr class="border-b border-gray-200 hover:bg-white transition-colors">
                          <td class="px-3 py-1.5 font-medium text-gray-800">Năm dữ liệu</td>
                          <td class="px-3 py-1.5 text-right font-bold text-gray-800">${m.admissionYear ?? 'Mới nhất'}</td>
                        </tr>`}
                      </tbody>
                    </table>
                  </div>
                </div>` : `
                <!-- Không có ngành → highlightMajors -->
                ${(ud.highlightMajors && ud.highlightMajors.length) ? `
                <div>
                  <h3 class="text-base font-bold text-gray-800 xácflex items-center gap-2 mb-2"><i class="fas fa-chart-line text-blue-600 mr-2"></i>Điểm chuẩn tiêu biểu</h3>
                  <div class="bg-white rounded-lg overflow-hidden border border-gray-200">
                    <table class="w-full text-base text-left">
                      <thead class="text-sm font-bold text-gray-800 uppercase bg-white">
                        <tr>
                          <th class="px-3 py-2">Ngành</th>
                          <th class="px-3 py-2 text-right">Điểm chuẩn</th>
                        </tr>
                      </thead>
                      <tbody>
                        ${ud.highlightMajors.map((hm, i) => `
                        <tr class="${i < ud.highlightMajors.length - 1 ? 'border-b border-gray-200' : ''} hover:bg-white transition-colors">
                          <td class="px-3 py-2 font-medium text-gray-800">${hm.majorName}</td>
                          <td class="px-3 py-2 text-right font-bold text-gray-800">${hm.score}</td>
                        </tr>`).join('')}
                      </tbody>
                    </table>
                  </div>
                </div>` : ''}
                `}

              </div>
            </div>

          </div>

          <!-- ═══ CỘT PHẢI (1/3): Preview ảnh ═══ -->
          ${previewCard}

        </div>`;

          } else {
            html += `
        <div class="card-in ${previewCard ? 'grid grid-cols-1 md:grid-cols-5 gap-5' : ''}">
          <div class="${previewCard ? 'md:col-span-3' : ''} bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden border border-gray-200">
            <div class="px-6 py-5">
              <div class="bg-amber-50 border border-amber-200 rounded-xl p-4 text-amber-800 text-sm">
                ⚠️ Không phân tích được thông tin trường/ngành
              </div>
            </div>
          </div>
          ${previewCard}
        </div>`;
          }

          area.innerHTML = html;
          area.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // ─── Render error ─────────────────────────────────────────
        function renderError(msg) {
          document.getElementById('result-area').innerHTML = `
        <div class="card-in bg-red-50 border border-red-200 rounded-xl p-5 text-red-700 text-sm">
          <p class="font-bold mb-1">❌ Lỗi kết nối API</p>
          <p class="text-xs font-mono break-all">${msg}</p>
          <p class="text-xs mt-2 text-red-500">Đảm bảo server đang chạy tại <code>0.0.0.0:8188</code></p>
        </div>`;
        }
      </script>
    </div>
  </div>
</body>

</html>
