<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phân tích thông tin sinh viên</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    * {
      font-family: 'Inter', sans-serif;
    }

    .score-fill {
      animation: growBar 1s ease-out forwards;
    }

    @keyframes growBar {
      from {
        width: 0%;
      }
    }

    .card-in {
      animation: fadeUp 0.4s ease-out both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Drag-over highlight */
    .drag-over {
      border-color: #6366f1 !important;
      background: #eef2ff !important;
    }

    /* Spinner */
    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid #c7d2fe;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Preview images */
    .img-thumb {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 8px;
    }

    /* Pulse status dot */
    .pulse-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 1.6s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .3;
      }
    }
  </style>
</head>

<body class="bg-slate-100 min-h-screen">

  <!-- ═══ HEADER ═══ -->
  <header class="bg-white border-b border-gray-100 shadow-sm px-6 py-4 flex items-center gap-3">
    <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-white font-bold text-sm">SV
    </div>
    <div>
      <h1 class="font-bold text-gray-800 text-base leading-tight">Phân tích thông tin sinh viên</h1>
      <p class="text-[11px] text-gray-400">OCR ảnh → Gemini → Phân tích trường/ngành</p>
    </div>
    <div id="api-status" class="ml-auto flex items-center gap-2 text-xs text-gray-400">
      <span class="pulse-dot"></span>
      <span>API: 0.0.0.0:8188</span>
    </div>
  </header>

  <main class="max-w-6xl mx-auto p-6 space-y-6">

    <!-- ═══ INPUT FORM ═══ -->
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 card-in">
      <p class="text-sm font-bold text-gray-700 mb-4">📤 Nhập ảnh để phân tích</p>

      <!-- Tab: URL / Upload -->
      <div class="flex gap-1 p-1 bg-gray-100 rounded-lg mb-5 w-fit">
        <button id="tab-url" onclick="switchTab('url')"
          class="tab-btn active px-4 py-1.5 rounded-md text-sm font-medium transition-all bg-white shadow text-indigo-700">🔗
          URL ảnh</button>
        <button id="tab-upload" onclick="switchTab('upload')"
          class="tab-btn px-4 py-1.5 rounded-md text-sm font-medium transition-all text-gray-500 hover:text-gray-700">📁
          Upload file</button>
      </div>

      <!-- Panel: URL -->
      <div id="panel-url" class="space-y-3">
        <div id="url-list" class="space-y-2"></div>
        <button onclick="addUrlInput()"
          class="flex items-center gap-1.5 text-xs text-indigo-500 hover:text-indigo-700 font-medium transition-colors">
          <span class="text-base leading-none">＋</span> Thêm URL
        </button>
      </div>

      <!-- Panel: Upload -->
      <div id="panel-upload" class="hidden">
        <div id="drop-zone"
          class="border-2 border-dashed border-gray-200 rounded-xl p-8 text-center cursor-pointer hover:border-indigo-400 hover:bg-indigo-50/50 transition-all"
          ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)"
          onclick="document.getElementById('file-input').click()">
          <div class="text-4xl mb-2">🖼️</div>
          <p class="text-sm font-medium text-gray-600">Kéo thả ảnh vào đây, hoặc click để chọn</p>
          <p class="text-xs text-gray-400 mt-1">JPG, PNG, WEBP — tối đa 10MB</p>
          <input id="file-input" type="file" accept="image/*" multiple class="hidden" onchange="onFileSelect(event)" />
        </div>
        <div id="file-preview" class="flex flex-wrap gap-3 mt-4"></div>
      </div>

      <!-- Submit -->
      <button id="submit-btn" onclick="submitRequest()"
        class="mt-5 w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white font-semibold rounded-xl py-3 transition-all shadow-sm disabled:opacity-50 disabled:cursor-not-allowed">
        <span id="btn-icon">🔍</span>
        <span id="btn-text">Phân tích</span>
      </button>
    </div>

    <!-- ═══ RESULT AREA ═══ -->
    <div id="result-area"></div>

  </main>

  <script>
    // ─── State ───────────────────────────────────────────────
    const API_URL = '/api/extract';  // relative — same server as FastAPI
    let currentTab = 'url';
    let selectedFiles = [];
    let urlInputCount = 0;

    // ─── Tab switching ────────────────────────────────────────
    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('panel-url').classList.toggle('hidden', tab !== 'url');
      document.getElementById('panel-upload').classList.toggle('hidden', tab !== 'upload');
      document.querySelectorAll('.tab-btn').forEach(btn => {
        const isActive = btn.id === `tab-${tab}`;
        btn.classList.toggle('bg-white', isActive);
        btn.classList.toggle('shadow', isActive);
        btn.classList.toggle('text-indigo-700', isActive);
        btn.classList.toggle('text-gray-500', !isActive);
      });
    }

    // ─── URL inputs ───────────────────────────────────────────
    function addUrlInput(value = '') {
      urlInputCount++;
      const id = `url-input-${urlInputCount}`;
      const div = document.createElement('div');
      div.className = 'flex gap-2 items-center';
      div.id = `url-row-${urlInputCount}`;
      div.innerHTML = `
        <input id="${id}" type="url" value="${value}" placeholder="https://example.com/bangdiem.jpg"
          class="flex-1 px-4 py-2.5 rounded-xl border border-gray-200 text-sm bg-white focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all placeholder-gray-300" />
        <button onclick="document.getElementById('url-row-${urlInputCount}').remove()" class="text-gray-300 hover:text-red-400 transition-colors text-lg leading-none">×</button>`;
      document.getElementById('url-list').appendChild(div);
    }

    // Init with 1 URL input
    addUrlInput();

    // ─── File upload ──────────────────────────────────────────
    function onDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
    function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
    function onDrop(e) {
      e.preventDefault(); e.currentTarget.classList.remove('drag-over');
      addFiles(Array.from(e.dataTransfer.files));
    }
    function onFileSelect(e) { addFiles(Array.from(e.target.files)); }

    function addFiles(newFiles) {
      const valid = newFiles.filter(f => f.type.startsWith('image/'));
      selectedFiles.push(...valid);
      renderFilePreviews();
    }

    function renderFilePreviews() {
      const container = document.getElementById('file-preview');
      container.innerHTML = '';
      selectedFiles.forEach((file, i) => {
        const url = URL.createObjectURL(file);
        const div = document.createElement('div');
        div.className = 'relative group';
        div.innerHTML = `
          <img src="${url}" class="img-thumb border border-gray-200 shadow-sm" />
          <button onclick="removeFile(${i})"
            class="absolute -top-1.5 -right-1.5 w-5 h-5 bg-red-500 text-white rounded-full text-xs flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">×</button>
          <p class="text-[9px] text-gray-400 mt-1 max-w-[72px] truncate">${file.name}</p>`;
        container.appendChild(div);
      });
    }

    function removeFile(i) { selectedFiles.splice(i, 1); renderFilePreviews(); }

    // ─── Submit ───────────────────────────────────────────────
    async function submitRequest() {
      setLoading(true);

      try {
        let response;

        if (currentTab === 'url') {
          const inputs = document.querySelectorAll('#url-list input[type="url"]');
          const urls = Array.from(inputs).map(i => i.value.trim()).filter(Boolean);
          if (!urls.length) { alert('Vui lòng nhập ít nhất 1 URL ảnh.'); setLoading(false); return; }

          // Form data (List[str] = Form(None))
          const fd = new FormData();
          urls.forEach(u => fd.append('images', u));
          response = await fetch(API_URL, { method: 'POST', body: fd });

        } else {
          if (!selectedFiles.length) { alert('Vui lòng chọn ít nhất 1 file ảnh.'); setLoading(false); return; }
          const fd = new FormData();
          selectedFiles.forEach(f => fd.append('files', f));
          response = await fetch(API_URL, { method: 'POST', body: fd });
        }

        if (!response.ok) {
          const errText = await response.text();
          throw new Error(`HTTP ${response.status}: ${errText}`);
        }

        const data = await response.json();
        renderResult(data);

      } catch (err) {
        renderError(err.message);
      } finally {
        setLoading(false);
      }
    }

    // ─── Loading state ────────────────────────────────────────
    function setLoading(on) {
      const btn = document.getElementById('submit-btn');
      const icon = document.getElementById('btn-icon');
      const text = document.getElementById('btn-text');
      btn.disabled = on;
      icon.innerHTML = on ? '<div class="spinner"></div>' : '🔍';
      text.textContent = on ? 'Đang phân tích...' : 'Phân tích';
    }

    // ─── Gauge helper ─────────────────────────────────────────
    function renderGauge(score, rating) {
      const color = SCORE_COLOR[rating] || '#6366f1';
      const pct = Math.min(Math.max(score || 0, 0), 100);
      // semi-circle: r=46, cx=56 cy=56, arc from 180° to 0° (left→right)
      const r = 46, cx = 56, cy = 60;
      const circumference = Math.PI * r; // half circle
      const dash = (pct / 100) * circumference;
      const gap = circumference - dash;
      return `
        <svg viewBox="0 0 112 70" width="120" height="75">
          <!-- Track -->
          <path d="M10,60 A46,46 0 0,1 102,60" fill="none" stroke="#e5e7eb" stroke-width="10" stroke-linecap="round"/>
          <!-- Fill -->
          <path d="M10,60 A46,46 0 0,1 102,60" fill="none" stroke="${color}" stroke-width="10"
            stroke-linecap="round"
            stroke-dasharray="${dash.toFixed(1)} ${gap.toFixed(1)}"
            stroke-dashoffset="0"
            style="transition:stroke-dasharray 1s ease-out;"/>
          <!-- Score label -->
          <text x="56" y="56" text-anchor="middle" font-size="18" font-weight="800" fill="${color}" font-family="Inter,sans-serif">${pct.toFixed(0)}</text>
          <text x="56" y="68" text-anchor="middle" font-size="8" fill="#9ca3af" font-family="Inter,sans-serif">/100</text>
        </svg>`;
    }

    // ─── Rating helpers ───────────────────────────────────────
    const RATING_STYLE = {
      'Top': 'bg-purple-100 text-purple-700 border-purple-200',
      'Tốt': 'bg-green-100 text-green-700 border-green-200',
      'Khá': 'bg-blue-100 text-blue-700 border-blue-200',
      'Trung bình': 'bg-yellow-100 text-yellow-800 border-yellow-200',
      'Kém': 'bg-red-100 text-red-700 border-red-200',
    };
    const RATING_BADGE = {
      'Top': '🏆 Top Tier', 'Tốt': '✨ Tốt', 'Khá': '👍 Khá',
      'Trung bình': '⚖️ Trung bình', 'Kém': '⚠️ Kém',
    };
    const SCORE_COLOR = {
      'Top': '#a855f7', 'Tốt': '#22c55e', 'Khá': '#3b82f6',
      'Trung bình': '#eab308', 'Kém': '#ef4444',
    };
    const REGION_LABEL = { urban: '🏙️ Trung tâm TP', suburban: '🏘️ Ngoại ô / Huyện', rural: '🌾 Nông thôn' };
    const POSITION_LABEL = { main_street: '🛣️ Mặt tiền', alley: '↪️ Hẻm xe hơi', deep_alley: '🚫 Hẻm sâu' };

    function ratingBadge(rating) {
      const s = RATING_STYLE[rating] || '';
      return `<span class="px-3 py-0.5 rounded-full text-xs font-bold border ${s}">${RATING_BADGE[rating] || rating}</span>`;
    }

    // ─── Render result ────────────────────────────────────────
    function renderResult(data) {
      const area = document.getElementById('result-area');

      // ── OCR raw (from results[0].data) ──
      const ocr = data.results?.[0]?.data || {};
      const src = data.results?.[0]?.source || '';

      // ── University data ──
      const ud = data.university_data;

      let html = ``;

      if (ud && (ud.university || ud.major)) {
        const u = ud.university || {};
        const m = ud.major || {};
        const hasUniversity = u && u.name;
        const hasMajor = m && m.name;
        const uScoreColor = SCORE_COLOR[u?.rating] || '#6366f1';
        const mScoreColor = SCORE_COLOR[m?.rating] || '#6366f1';

        html += `
        <div class="card-in grid grid-cols-1 md:grid-cols-2 gap-5">

          <!-- ═══ CỘT TRÁI: Header + Gauge + Học phí + OCR ═══ -->
          <div class="space-y-5">
            <!-- Header -->
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
              <div class="bg-gradient-to-r from-blue-600 to-indigo-700 p-6 text-white">
                <div class="flex justify-between items-start">
                  <div>
                    ${hasUniversity
            ? `<h2 class="text-2xl font-bold mb-1">${u.name}</h2>
                         <div class="flex items-center gap-2 text-blue-100 text-sm">📍 <span>${u.location || 'N/A'}</span></div>`
            : `<h2 class="text-2xl font-bold mb-1">Kết quả phân tích</h2>`}
                  </div>
                  <div class="flex items-center gap-3">
                    <span class="pulse-dot" style="background:${data.success ? '#22c55e' : '#ef4444'}"></span>
                    ${hasUniversity ? `<span class="px-3 py-1.5 rounded-lg text-sm font-bold border shadow-sm bg-white/90 ${RATING_STYLE[u.rating] || ''}">${RATING_BADGE[u.rating] || u.rating}</span>` : ''}
                  </div>
                </div>
              </div>
            </div>
            <!-- Gauge điểm quy đổi (cột trái) -->
            ${hasUniversity ? `
            <div class="flex flex-col items-center justify-center p-4 bg-white rounded-2xl shadow-lg border border-gray-100">
              ${renderGauge(u.schoolScore100, u.rating)}
              <div class="mt-2 text-center">
                <p class="text-sm font-bold px-3 py-1 rounded-full inline-block mb-1 ${RATING_STYLE[u.rating] || 'bg-gray-100 text-gray-600'}">${RATING_BADGE[u.rating] || u.rating}</p>
                <p class="text-xs text-gray-500">Điểm trường dựa trên điểm đầu vào quy đổi thang 100</p>
              </div>
            </div>` : ''}
            <!-- OCR Raw -->
            <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-5">
              <p class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-3">📄 Thông tin OCR từ ảnh</p>
              <div class="space-y-3 text-sm">
                <div class="bg-slate-50 rounded-lg p-3 border border-slate-100">
                  <p class="text-xs text-slate-400 uppercase mb-1">Tên trường</p>
                  <p class="font-bold text-slate-700">${ocr.school_name || '<span class="text-slate-400 italic">Không tìm thấy</span>'}</p>
                </div>
                <div class="bg-slate-50 rounded-lg p-3 border border-slate-100">
                  <p class="text-xs text-slate-400 uppercase mb-1">Ngành</p>
                  <p class="font-bold text-slate-700">${ocr.major || '<span class="text-slate-400 italic">Không tìm thấy</span>'}</p>
                </div>
                <div class="bg-slate-50 rounded-lg p-3 border border-slate-100">
                  <p class="text-xs text-slate-400 uppercase mb-1">GPA</p>
                  <p class="font-bold ${ocr.gpa ? 'text-slate-700' : 'text-slate-400 italic'}">${ocr.gpa ?? 'Không tìm thấy'}</p>
                </div>
              </div>
              ${src ? `<p class="text-[10px] text-gray-400 mt-3">Nguồn: <a href="${src}" target="_blank" class="text-blue-400 hover:underline">${src.substring(0, 60)}…</a></p>` : ''}
            </div>
          </div>

          <!-- ═══ CỘT PHẢI: Trường + Ngành ═══ -->
          <div class="space-y-5">
            <!-- Trường (chỉ hiển thị mô tả, gauge đã ở cột trái) -->
            ${hasUniversity && u.description ? `
            <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-5">
              <div class="flex items-center justify-between mb-3">
                <h3 class="text-lg font-bold text-gray-800 flex items-center gap-2">🏫 Thông tin trường</h3>
                <span class="px-3 py-1 rounded-lg text-xs font-bold border shadow-sm ${RATING_STYLE[u.rating] || ''}">${RATING_BADGE[u.rating] || u.rating}</span>
              </div>
              <p class="text-gray-600 text-sm leading-relaxed">${u.description}</p>
            </div>` : ''}

            <!-- Ngành (nếu có) -->
            ${hasMajor ? `
            <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-5">
              <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-bold text-gray-800 flex items-center gap-2">🎓 ${m.name}</h3>
                <span class="px-3 py-1 rounded-lg text-xs font-bold border shadow-sm ${RATING_STYLE[m.rating] || ''}">${RATING_BADGE[m.rating] || m.rating}</span>
              </div>
              <!-- Gauge -->
              <div class="col-span-1 flex flex-col items-center justify-center p-4 bg-gray-50 rounded-xl border border-gray-100 mb-4">
                ${renderGauge(m.majorScore100, m.rating)}
                <div class="mt-2 text-center">
                  <p class="text-sm font-bold px-3 py-1 rounded-full inline-block mb-1 ${RATING_STYLE[m.rating] || 'bg-gray-100 text-gray-600'}">${RATING_BADGE[m.rating] || m.rating}</p>
                  <p class="text-xs text-gray-500">Điểm ngành dựa trên điểm đầu vào quy đổi thang 100</p>
                </div>
              </div>
              <!-- Học phí -->
              <div class="bg-green-50 rounded-lg p-3 border border-green-100 mb-4">
                <p class="text-[10px] font-bold uppercase text-green-700 tracking-wider mb-0.5">💵 Học phí ước tính</p>
                <p class="text-sm font-semibold text-green-900">${m.tuition || (m.tuitionAvg ? (m.tuitionAvg / 1_000_000).toFixed(0) + ' triệu / năm' : 'N/A')}</p>
              </div>
              ${m.description ? `<p class="text-gray-600 text-sm leading-relaxed mb-3">${m.description}</p>` : ''}
              <!-- Bảng thông số -->
              <div class="bg-gray-50 rounded-lg overflow-hidden border border-gray-100">
                <table class="w-full text-sm text-left">
                  <thead class="text-xs text-gray-500 uppercase bg-gray-100">
                    <tr>
                      <th class="px-3 py-1.5">Chỉ số</th>
                      <th class="px-3 py-1.5 text-right">Giá trị</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr class="border-b border-gray-200 hover:bg-white transition-colors">
                      <td class="px-3 py-1.5 font-medium text-gray-700">Điểm trường dựa trên điểm đầu vào quy đổi thang 100</td>
                      <td class="px-3 py-1.5 text-right font-bold" style="color:${mScoreColor}">${m.schoolScore100?.toFixed(1) || 'N/A'}</td>
                    </tr>
                    <tr class="border-b border-gray-200 hover:bg-white transition-colors">
                      <td class="px-3 py-1.5 font-medium text-gray-700">Học phí TB / năm</td>
                      <td class="px-3 py-1.5 text-right text-green-700 font-bold">${m.tuitionAvg ? (m.tuitionAvg / 1_000_000).toFixed(0) + ' triệu' : 'N/A'}</td>
                    </tr>
                    <tr class="border-b border-gray-200 hover:bg-white transition-colors">
                      <td class="px-3 py-1.5 font-medium text-gray-700">Năm dữ liệu</td>
                      <td class="px-3 py-1.5 text-right font-bold text-gray-700">${m.admissionYear ?? 'Mới nhất'}</td>
                    </tr>
                    <tr class="hover:bg-white transition-colors">
                      <td class="px-3 py-1.5 font-medium text-gray-700">Thang điểm gốc</td>
                      <td class="px-3 py-1.5 text-right font-bold text-gray-700">${m.scoreScale ?? 30}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>` : `
            <!-- Không có ngành → hiển thị highlightMajors -->
            ${(ud.highlightMajors && ud.highlightMajors.length) ? `

            <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-5">
              <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-bold text-gray-800 flex items-center gap-2">📋 Điểm chuẩn tiêu biểu</h3>
                <span class="px-3 py-1 rounded-lg text-xs font-bold border shadow-sm bg-indigo-100 text-indigo-700 border-indigo-200">Các ngành trong trường</span>
              </div>
              <p class="text-xs text-gray-400 mb-3">Không xác định được ngành học — hiển thị điểm chuẩn một số ngành tiêu biểu của trường</p>
              
              ${u.tuitionAvg ? `
              <div class="bg-green-50 rounded-lg p-3 border border-green-100 mb-3">
                <p class="text-[10px] font-bold uppercase text-green-700 tracking-wider mb-0.5">💵 Học phí TB ước tính</p>
                <p class="text-sm font-semibold text-green-900">${u.tuition || (u.tuitionAvg / 1_000_000).toFixed(0) + ' triệu / năm'}</p>
              </div>` : ''}

              <div class="bg-gray-50 rounded-lg overflow-hidden border border-gray-100">
                <table class="w-full text-sm text-left">
                  <thead class="text-xs text-gray-500 uppercase bg-gray-100">
                    <tr>
                      <th class="px-3 py-2">Ngành</th>
                      <th class="px-3 py-2 text-right">Điểm chuẩn</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${ud.highlightMajors.map((hm, i) => `
                    <tr class="${i < ud.highlightMajors.length - 1 ? 'border-b border-gray-200' : ''} hover:bg-white transition-colors">
                      <td class="px-3 py-2 font-medium text-gray-700">${hm.majorName}</td>
                      <td class="px-3 py-2 text-right font-bold text-indigo-700">${hm.score}</td>
                    </tr>`).join('')}
                  </tbody>
                </table>
              </div>
            </div>` : ''}
            `}
          </div>


        </div>`;


      } else {
        html += `
        <div class="card-in bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
          <div class="bg-gradient-to-r from-gray-600 to-gray-700 p-6 text-white">
            <h2 class="text-2xl font-bold">Kết quả phân tích</h2>
          </div>
          <div class="px-6 pt-5 pb-4">
            <p class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-3">📄 Thông tin OCR từ ảnh</p>
            <div class="space-y-3 text-sm">
              <div class="bg-slate-50 rounded-lg p-3 border border-slate-100">
                <p class="text-xs text-slate-400 uppercase mb-1">Tên trường</p>
                <p class="font-bold text-slate-700">${ocr.school_name || '<span class="text-slate-400 italic">Không tìm thấy</span>'}</p>
              </div>
              <div class="bg-slate-50 rounded-lg p-3 border border-slate-100">
                <p class="text-xs text-slate-400 uppercase mb-1">Ngành</p>
                <p class="font-bold text-slate-700">${ocr.major || '<span class="text-slate-400 italic">Không tìm thấy</span>'}</p>
              </div>
              <div class="bg-slate-50 rounded-lg p-3 border border-slate-100">
                <p class="text-xs text-slate-400 uppercase mb-1">GPA</p>
                <p class="font-bold ${ocr.gpa ? 'text-slate-700' : 'text-slate-400 italic'}">${ocr.gpa ?? 'Không tìm thấy'}</p>
              </div>
            </div>
          </div>
          <div class="border-t border-gray-100 px-6 py-5">
            <div class="bg-amber-50 border border-amber-200 rounded-xl p-4 text-amber-800 text-sm">
              ⚠️ Không phân tích được thông tin trường/ngành
            </div>
          </div>
        </div>`;
      }

      area.innerHTML = html;
      area.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ─── Render error ─────────────────────────────────────────
    function renderError(msg) {
      document.getElementById('result-area').innerHTML = `
        <div class="card-in bg-red-50 border border-red-200 rounded-xl p-5 text-red-700 text-sm">
          <p class="font-bold mb-1">❌ Lỗi kết nối API</p>
          <p class="text-xs font-mono break-all">${msg}</p>
          <p class="text-xs mt-2 text-red-500">Đảm bảo server đang chạy tại <code>0.0.0.0:8188</code></p>
        </div>`;
    }
  </script>
</body>

</html>
